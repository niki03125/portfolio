name: Build and deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DART_SASS_VERSION: 1.99.0
      GO_VERSION: 1.26.1
      HUGO_VERSION: 0.160.0
      NODE_VERSION: 24.14.1
      TZ: Europe/Copenhagen

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Create directory for user-specific executable files
        run: |
          mkdir -p "${HOME}/.local"

      - name: Install Dart Sass
        run: |
          curl -sLJO "https://github.com/sass/dart-sass/releases/download/${DART_SASS_VERSION}/dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz"
          tar -C "${HOME}/.local" -xf "dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz"
          rm "dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz"
          echo "${HOME}/.local/dart-sass" >> "${GITHUB_PATH}"

      - name: Install Hugo
        run: |
          curl -sLJO "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          mkdir -p "${HOME}/.local/hugo"
          tar -C "${HOME}/.local/hugo" -xf "hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          rm "hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          echo "${HOME}/.local/hugo" >> "${GITHUB_PATH}"

      - name: Verify installations
        run: |
          echo "Dart Sass: $(sass --version)"
          echo "Go: $(go version)"
          echo "Hugo: $(hugo version)"
          echo "Node.js: $(node --version)"

      - name: Install Node.js dependencies
        run: |
          [[ -f package-lock.json || -f npm-shrinkwrap.json ]] && npm ci || true

      - name: Configure Git
        run: |
          git config core.quotepath false

      - name: Cache restore
        id: cache-restore
        uses: actions/cache/restore@v5
        with:
          path: ${{ runner.temp }}/hugo_cache
          key: hugo-${{ github.run_id }}
          restore-keys:
            hugo-

      - name: Build the site
        run: |
          hugo build \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/" \
            --cacheDir "${{ runner.temp }}/hugo_cache"

      - name: Cache save
        id: cache-save
        uses: actions/cache/save@v5
        with:
          path: ${{ runner.temp }}/hugo_cache
          key: ${{ steps.cache-restore.outputs.cache-primary-key }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  sync-dify:
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Combine Hugo content into one file
        env:
          DIFY_DATASET_ID: ${{ secrets.DIFY_DATASET_ID }}
          DIFY_API_KEY: ${{ secrets.DIFY_API_KEY }}
        run: |
          rm -f dify-knowledge.txt
          touch dify-knowledge.txt

          echo "# Portfolio Knowledge Base" >> dify-knowledge.txt
          echo "" >> dify-knowledge.txt

          find content -type f -name "*.md" | sort | while read file; do
            echo "" >> dify-knowledge.txt
            echo "--- FILE: $file ---" >> dify-knowledge.txt
            cat "$file" >> dify-knowledge.txt
            echo "" >> dify-knowledge.txt
          done

          if [ -d data ]; then
            find data -type f -name "*.md" | sort | while read file; do
              echo "" >> dify-knowledge.txt
              echo "--- FILE: $file ---" >> dify-knowledge.txt
              cat "$file" >> dify-knowledge.txt
              echo "" >> dify-knowledge.txt
            done
          fi

      - name: Delete existing documents from Dify knowledge base
        env:
          DIFY_DATASET_ID: ${{ secrets.DIFY_DATASET_ID }}
          DIFY_API_KEY: ${{ secrets.DIFY_API_KEY }}
        run: |
          DOCS=$(curl -s --request GET \
            --url "https://api.dify.ai/v1/datasets/${DIFY_DATASET_ID}/documents" \
            --header "Authorization: Bearer ${DIFY_API_KEY}" \
            | python3 -c "import sys, json; docs=json.load(sys.stdin).get('data', []); [print(d['id']) for d in docs]")

          for DOC_ID in $DOCS; do
            echo "Deleting document: $DOC_ID"
            curl -s --request DELETE \
              --url "https://api.dify.ai/v1/datasets/${DIFY_DATASET_ID}/documents/${DOC_ID}" \
              --header "Authorization: Bearer ${DIFY_API_KEY}"
            echo ""
          done

      - name: Upload new content to Dify
        env:
          DIFY_DATASET_ID: ${{ secrets.DIFY_DATASET_ID }}
          DIFY_API_KEY: ${{ secrets.DIFY_API_KEY }}
        run: |
          curl --request POST \
            --url "https://api.dify.ai/v1/datasets/${DIFY_DATASET_ID}/document/create-by-file" \
            --header "Authorization: Bearer ${DIFY_API_KEY}" \
            --form "file=@dify-knowledge.txt;type=text/plain" \
            --form 'data={"indexing_technique":"high_quality","process_rule":{"mode":"automatic"}}'